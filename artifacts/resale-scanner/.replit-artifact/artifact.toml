kind = "mobile"
previewPath = "/"
title = "Resale Price Scanner"
version = "1.0.0"
id = "artifacts/resale-scanner"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 22088

[services.development]
run = "pnpm --filter @workspace/resale-scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resale-scanner", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/resale-scanner", "run", "serve" ]

[services.env]
PORT = "22088"
BASE_PATH = "/"
