openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analyze
    description: AI image analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze:
    post:
      operationId: analyzeItemImage
      tags: [analyze]
      summary: Analyze item image for resale value
      description: Accepts a base64-encoded image and returns AI-powered resale analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data
        mimeType:
          type: string
          description: MIME type of the image (e.g. image/jpeg)
      required:
        - imageBase64
        - mimeType
    AnalyzeResult:
      type: object
      properties:
        itemName:
          type: string
        category:
          type: string
        estimatedLow:
          type: number
        estimatedHigh:
          type: number
        description:
          type: string
        confidenceLevel:
          type: string
        suggestedPlatforms:
          type: array
          items:
            type: string
        listingTags:
          type: array
          description: Keyword tags optimised for resale listing titles and tag fields
          items:
            type: string
      required:
        - itemName
        - category
        - estimatedLow
        - estimatedHigh
        - description
        - confidenceLevel
        - suggestedPlatforms
        - listingTags
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
